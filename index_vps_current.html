<!doctype html>
<html lang="zh_CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyanpass Dev - 管理面板</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f0f2f5;
        color: #333;
        display: flex;
        min-height: 100vh;
      }
      /* LOGIN */
      .login-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 100vh;
        background: linear-gradient(135deg, #001529 0%, #003a70 100%);
      }
      .login-box {
        background: #fff;
        border-radius: 8px;
        padding: 40px;
        width: 380px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }
      .login-box h2 {
        text-align: center;
        margin-bottom: 24px;
        font-size: 20px;
        color: #001529;
      }
      .login-box .f-grp {
        margin-bottom: 16px;
      }
      .login-box .f-grp label {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
        color: #555;
      }
      .login-box .f-grp input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        font-size: 14px;
      }
      .login-box .btn {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        border: none;
      }
      .login-box .btn-primary {
        background: #1677ff;
        color: #fff;
      }
      .login-box .btn-primary:hover {
        background: #4096ff;
      }
      .login-err {
        color: #ff4d4f;
        font-size: 13px;
        text-align: center;
        margin-bottom: 12px;
        display: none;
      }
      /* SIDEBAR */
      .sidebar {
        width: 220px;
        min-width: 220px;
        background: #001529;
        color: #fff;
        display: flex;
        flex-direction: column;
        transition: 0.2s;
        overflow: hidden;
      }
      .sidebar.collapsed {
        width: 60px;
        min-width: 60px;
      }
      .sidebar-logo {
        padding: 16px;
        text-align: center;
        font-size: 15px;
        font-weight: 700;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        white-space: nowrap;
      }
      .sidebar-logo span {
        color: #1677ff;
      }
      .sidebar-menu {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      .sidebar-toggle {
        padding: 12px;
        text-align: center;
        cursor: pointer;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.65);
        font-size: 13px;
        user-select: none;
      }
      .sidebar-toggle:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
      }
      .menu-group-header {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.65);
        font-size: 14px;
        user-select: none;
        transition: 0.2s;
        white-space: nowrap;
      }
      .menu-group-header:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
      }
      .menu-group-header .icon {
        width: 20px;
        text-align: center;
        margin-right: 10px;
        font-size: 14px;
        flex-shrink: 0;
      }
      .menu-group-header .label {
        flex: 1;
      }
      .menu-group-header .arrow {
        font-size: 10px;
        transition: 0.2s;
      }
      .menu-group-header .arrow.open {
        transform: rotate(90deg);
      }
      .menu-sub {
        overflow: hidden;
        transition: max-height 0.3s;
      }
      .menu-sub.collapsed {
        max-height: 0;
      }
      .menu-sub.expanded {
        max-height: 300px;
      }
      .menu-item {
        display: flex;
        align-items: center;
        padding: 9px 16px 9px 46px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.65);
        font-size: 13px;
        transition: 0.2s;
        white-space: nowrap;
      }
      .menu-item:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
      }
      .menu-item.active {
        color: #fff;
        background: #1677ff;
      }
      .menu-item .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        margin-right: 8px;
        flex-shrink: 0;
        opacity: 0.4;
      }
      .menu-item.active .dot {
        opacity: 1;
      }
      /* MAIN */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .topbar {
        background: #fff;
        padding: 0 24px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #e8e8e8;
        flex-shrink: 0;
      }
      .topbar h1 {
        font-size: 16px;
        font-weight: 600;
      }
      .content {
        flex: 1;
        padding: 16px 24px;
        overflow-y: auto;
      }
      /* TABLE */
      .card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        overflow: hidden;
      }
      .card-header {
        padding: 12px 20px;
        border-bottom: 1px solid #f0f0f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .card-header h2 {
        font-size: 15px;
        font-weight: 600;
      }
      .card-body {
        padding: 0;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 10px 14px;
        text-align: left;
        border-bottom: 1px solid #f0f0f0;
        font-size: 13px;
      }
      th {
        background: #fafafa;
        font-weight: 600;
        color: #555;
        white-space: nowrap;
      }
      tr:hover {
        background: #fafafa;
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
      }
      .t-blue {
        background: #e6f7ff;
        color: #1890ff;
      }
      .t-green {
        background: #f6ffed;
        color: #52c41a;
      }
      .t-orange {
        background: #fff7e6;
        color: #fa8c16;
      }
      .t-red {
        background: #fff1f0;
        color: #ff4d4f;
      }
      .t-gray {
        background: #f0f0f0;
        color: #666;
      }
      .t-purple {
        background: #f9f0ff;
        color: #722ed1;
      }
      .btn {
        padding: 5px 12px;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        font-size: 12px;
        margin: 0 2px;
        transition: 0.2s;
        white-space: nowrap;
      }
      .btn:hover {
        border-color: #1677ff;
        color: #1677ff;
      }
      .btn-primary {
        background: #1677ff;
        border-color: #1677ff;
        color: #fff;
      }
      .btn-primary:hover {
        background: #4096ff;
      }
      .btn-danger {
        color: #ff4d4f;
        border-color: #ff4d4f;
      }
      .btn-danger:hover {
        background: #fff1f0;
      }
      /* MODAL */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        z-index: 1000;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 40px;
      }
      .modal {
        background: #fff;
        border-radius: 8px;
        width: 680px;
        max-height: 85vh;
        overflow-y: auto;
        padding: 24px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      }
      .modal h3 {
        margin-bottom: 16px;
        font-size: 15px;
        font-weight: 600;
      }
      .modal .f-row {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
      }
      .modal .f-row > * {
        flex: 1;
      }
      .modal .f-grp {
        margin-bottom: 12px;
      }
      .modal .f-grp label {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
        color: #555;
        font-weight: 500;
      }
      .modal .f-grp input,
      .modal .f-grp select,
      .modal .f-grp textarea {
        width: 100%;
        padding: 7px 11px;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
      }
      .modal .f-grp textarea {
        font-family: monospace;
        min-height: 60px;
        resize: vertical;
      }
      .modal .f-grp .f-check {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-top: 4px;
      }
      .modal .f-grp .f-check input[type="checkbox"] {
        width: auto;
      }
      .modal .f-section {
        margin: 16px 0 8px;
        padding-top: 12px;
        border-top: 1px solid #f0f0f0;
      }
      .modal .f-section h4 {
        font-size: 13px;
        color: #999;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .modal-actions {
        text-align: right;
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #f0f0f0;
      }
      .modal-actions button {
        margin-left: 8px;
      }
      /* CHAIN TABLE */
      .chain-table {
        width: 100%;
        border: 1px solid #f0f0f0;
        border-radius: 6px;
        margin-top: 8px;
      }
      .chain-table th,
      .chain-table td {
        padding: 6px 8px;
        font-size: 12px;
      }
      .chain-table th {
        background: #f5f5f5;
      }
      /* FOLDER MODAL */
      .folder-list {
        max-height: 300px;
        overflow-y: auto;
        border: 1px solid #f0f0f0;
        border-radius: 6px;
        padding: 8px;
      }
      .folder-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-bottom: 1px solid #fafafa;
      }
      .folder-item:last-child {
        border-bottom: none;
      }
      .folder-item:hover {
        background: #fafafa;
      }
      .folder-item .name {
        font-weight: 500;
      }
      .folder-item .count {
        color: #999;
        font-size: 12px;
      }
      #err {
        display: none;
        background: #fff2f0;
        border: 1px solid #ffccc7;
        color: #ff4d4f;
        padding: 10px 16px;
        margin-bottom: 12px;
        border-radius: 6px;
        font-size: 13px;
      }
      #loading {
        text-align: center;
        padding: 40px;
        color: #999;
      }
      @media (max-width: 768px) {
        .sidebar {
          width: 60px;
          min-width: 60px;
        }
        .sidebar .label,
        .sidebar .arrow {
          display: none;
        }
        .content {
          padding: 12px;
        }
        .modal {
          width: 95%;
        }
        .f-row {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body id="app-body">
    <!-- LOGIN -->
    <div id="login-page" class="login-wrap">
      <div class="login-box">
        <h2>Nyanpass 管理面板</h2>
        <div id="login-err" class="login-err"></div>
        <div class="f-grp">
          <label>用户名</label
          ><input id="login-user" placeholder="admin@example.com" />
        </div>
        <div class="f-grp">
          <label>密码</label
          ><input id="login-pass" type="password" placeholder="Mật khẩu" />
        </div>
        <div
          style="
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
          "
        >
          <input type="checkbox" id="login-remember" /><label
            style="color: #888; font-size: 13px; margin: 0; cursor: pointer"
            >Ghi nhớ đăng nhập (7 ngày)</label
          >
        </div>
        <button class="btn btn-primary" onclick="doLogin()" id="login-btn">
          登 录
        </button>
      </div>
    </div>

    <!-- MAIN -->
    <div id="main-layout" style="display: none; width: 100%">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><span>◇</span> Nyanpass</div>
        <nav class="sidebar-menu">
          <div class="menu-group">
            <div
              class="menu-group-header"
              onclick="toggleMenu(this)"
              data-open="true"
            >
              <span class="icon">⚙</span><span class="label">管理</span
              ><span class="arrow open">▶</span>
            </div>
            <div class="menu-sub expanded" id="sub-manage">
              <div
                class="menu-item active"
                data-page="dg"
                onclick="navTo(this, '设备组管理')"
              >
                <span class="dot"></span><span>设备组管理</span>
              </div>
              <div
                class="menu-item"
                data-page="probe"
                onclick="window.open('/probe.html', '_blank')"
              >
                <span class="dot"></span><span>节点状态(新)</span>
              </div>
              <div
                class="menu-item"
                data-page="fr"
                onclick="navTo(this, '转发规则')"
              >
                <span class="dot"></span><span>转发规则</span>
              </div>
              <div
                class="menu-item"
                data-page="users"
                onclick="navTo(this, '用户管理')"
              >
                <span class="dot"></span><span>用户管理</span>
              </div>
              <div
                class="menu-item"
                data-page="ug"
                onclick="navTo(this, '用户组管理')"
              >
                <span class="dot"></span><span>用户组管理</span>
              </div>
            </div>
          </div>
        </nav>
        <div class="sidebar-toggle" onclick="toggleSidebar()">◀</div>
      </aside>
      <div class="main">
        <header class="topbar">
          <h1 id="page-title">设备组管理</h1>
          <span
            style="font-size: 13px; color: #999; cursor: pointer"
            onclick="doLogout()"
            >👤 Admin ▾</span
          >
        </header>
        <div class="content"><div id="page-content"></div></div>
      </div>
    </div>

    <!-- MODAL -->
    <div
      id="modalOverlay"
      class="modal-overlay"
      style="display: none"
      onclick="if (event.target === this) closeModal();"
    >
      <div class="modal" id="modalBody"></div>
    </div>

    <script>
      var API = "/api/v1",
        token = "",
        dgData = [],
        userData = [],
        ugData = [],
        folderData = [];

      // ========== AUTH ==========
      function doLogin() {
        var u = g("login-user").value,
          p = g("login-pass").value,
          e = g("login-err"),
          b = g("login-btn");
        if (!u || !p) {
          e.textContent = "Vui lòng nhập đầy đủ";
          e.style.display = "block";
          return;
        }
        b.disabled = true;
        b.textContent = "Đang đăng nhập...";
        fetch(API + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: u,
            password: p,
            remember: document.getElementById("login-remember").checked,
          }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (d) {
            if (d.code !== 0) throw new Error(d.msg || "Lỗi");
            token = d.data;
            localStorage.setItem("Authorization", token);
            g("login-page").style.display = "none";
            g("main-layout").style.display = "flex";
            renderDgPage();
          })
          .catch(function (x) {
            e.textContent = x.message;
            e.style.display = "block";
          })
          .finally(function () {
            b.disabled = false;
            b.textContent = "登 录";
          });
      }
      function doLogout() {
        fetch(API + "/auth/logout", {
          method: "POST",
          headers: { Authorization: token },
        }).finally(function () {
          token = "";
          localStorage.removeItem("Authorization");
          g("login-page").style.display = "flex";
          g("main-layout").style.display = "none";
        });
      }
      // Auto-login: bo qua login form neu co token, validate ngam
      (function () {
        var savedToken = localStorage.getItem("Authorization");
        if (savedToken) {
          token = savedToken;
          g("login-page").style.display = "none";
          g("main-layout").style.display = "flex";
          renderDgPage();
          // Validate trong background, chi xoa khi server xac nhan loi
          fetch(API + "/user/info", { headers: { Authorization: token } })
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              if (d.code !== 0 || !d.data || !d.data.username) {
                localStorage.removeItem("Authorization");
                token = "";
                g("login-page").style.display = "flex";
                g("main-layout").style.display = "none";
              }
            })
            .catch(function () {
              /* loi mang - giu token */
            });
        }
      })();

      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && g("login-page").style.display !== "none")
          doLogin();
      });

      // ========== HELPERS ==========
      function g(id) {
        return document.getElementById(id);
      }
      function esc(s) {
        return (s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function fmt(b) {
        if (b >= 1099511627776) return (b / 1099511627776).toFixed(1) + " TB";
        if (b >= 1073741824) return (b / 1073741824).toFixed(1) + " GB";
        if (b >= 1048576) return (b / 1048576).toFixed(1) + " MB";
        return b + " B";
      }
      function pe(msg) {
        var e = g("err");
        if (e) {
          e.textContent = "Lỗi: " + msg;
          e.style.display = "block";
        }
      }
      function q(u, o) {
        o = o || {};
        o.headers = o.headers || {};
        o.headers["Authorization"] = token;
        if (o.body && typeof o.body === "object") {
          o.headers["Content-Type"] = "application/json";
          o.body = JSON.stringify(o.body);
        }
        return fetch(u, o)
          .then(function (r) {
            return r.json();
          })
          .then(function (d) {
            if (d.code !== 0) throw new Error(d.msg || "Lỗi API");
            return d;
          });
      }
      function api(u) {
        return q(u);
      }
      function apiPut(u, d) {
        return q(u, { method: "PUT", body: d });
      }
      function apiPost(u, d) {
        return q(u, { method: "POST", body: d });
      }
      function apiDel(u, d) {
        return q(u, { method: "DELETE", body: d || {} });
      }

      // ========== SIDEBAR ==========
      function toggleSidebar() {
        var s = g("sidebar");
        s.classList.toggle("collapsed");
        s.querySelector(".sidebar-toggle").textContent = s.classList.contains(
          "collapsed",
        )
          ? "▶"
          : "◀";
      }
      function toggleMenu(h) {
        var o = h.getAttribute("data-open") === "true";
        h.setAttribute("data-open", o ? "false" : "true");
        h.querySelector(".arrow").classList.toggle("open", !o);
        var s = h.nextElementSibling;
        s.classList.toggle("expanded", !o);
        s.classList.toggle("collapsed", o);
      }
      function navTo(item, title) {
        document.querySelectorAll(".menu-item").forEach(function (el) {
          el.classList.remove("active");
        });
        item.classList.add("active");
        g("page-title").textContent = title;
        var p = item.getAttribute("data-page");
        if (p === "dg") renderDgPage();
        else if (p === "users") renderUsersPage();
        else if (p === "ug") renderUgPage();
        else if (p === "fr") renderFrPage();
      }

      // ========== DEVICE GROUP PAGE ==========
      var DG_TYPES = [
        { v: "DeviceGroupType_Inbound", l: "入口", c: "t-blue" },
        { v: "DeviceGroupType_OutboundBySite", l: "出口", c: "t-green" },
        { v: "DeviceGroupType_OutboundByUser", l: "单端出口", c: "t-purple" },
        { v: "DeviceGroupType_AgentOnly", l: "仅监控", c: "t-orange" },
        { v: "DeviceGroupType_ChainOutbound", l: "链式出口", c: "t-red" },
      ];
      function typeLabel(t) {
        var f = DG_TYPES.find(function (x) {
          return x.v === t;
        });
        return f || { l: t, c: "" };
      }
      function renderDgPage() {
        dgData = [];
        g("page-content").innerHTML =
          '<div class="card">' +
          '<div class="card-header"><h2>设备组列表</h2><div>' +
          '<button class="btn btn-primary" onclick="openDgModal()">+ 添加设备组</button> ' +
          '<button class="btn btn-danger" onclick="batchResetTraffic()">清空流量</button> ' +
          '<button class="btn" onclick="openFolderModal()">管理分组</button> ' +
          '<button class="btn" onclick="loadDg()">↻ 刷新</button>' +
          '</div></div><div id="err"></div><div id="loading">Đang tải...</div>' +
          '<div class="card-body"><table id="dg-tbl" style="display:none"><thead><tr>' +
          "<th>ID</th><th>名称</th><th>类型</th><th>Token</th><th>端口范围</th><th>在线</th><th>流量</th><th>排序</th><th>操作</th>" +
          '</tr></thead><tbody id="dg-tbody"></tbody></table></div></div>';
        loadDg();
      }
      function loadDg() {
        var lm = g("loading"),
          tbl = g("dg-tbl"),
          er = g("err");
        if (lm) lm.style.display = "block";
        if (tbl) tbl.style.display = "none";
        if (er) er.style.display = "none";
        // Fetch both DG list and node status
        Promise.all([
          api(API + "/admin/devicegroup"),
          api(API + "/system/node/status").catch(function () {
            return { data: [] };
          }),
        ])

      function buildConfig() {
        var t = g("f_type").value,
          cfg = {};
        var jsonStr = g("f_config_extra") ? g("f_config_extra").value : "{}";
        try {
          cfg = JSON.parse(jsonStr);
        } catch (e) {
          cfg = {};
        }
        switch (t) {
          case "DeviceGroupType_Inbound":
            if (g("f_udp") && g("f_udp").checked) cfg.udp_smart_bind = true;
            else delete cfg.udp_smart_bind;
            if (g("f_direct")) {
              var dp = parseInt(g("f_direct").value);
              if (dp) cfg.direct_policy = dp;
              else delete cfg.direct_policy;
            }
            if (g("f_blocked") && g("f_blocked").value)
              cfg.blocked_protocol = g("f_blocked").value;
            else delete cfg.blocked_protocol;
            if (g("f_blocked_host") && g("f_blocked_host").value)
              cfg.blocked_host = g("f_blocked_host").value;
            else delete cfg.blocked_host;
            if (g("f_blocked_path") && g("f_blocked_path").value)
              cfg.blocked_path = g("f_blocked_path").value;
            else delete cfg.blocked_path;
            break;
          case "DeviceGroupType_OutboundBySite":
            if (g("f_proto") && g("f_proto").value) {
              cfg.protocol = g("f_proto").value;
              cfg.display_protocol = g("f_proto").value;
            } else {
              delete cfg.protocol;
              delete cfg.display_protocol;
            }
            if (g("f_accept_proxy") && parseInt(g("f_accept_proxy").value))
              cfg.accept_proxy_protocol = 1;
            else delete cfg.accept_proxy_protocol;
            if (g("f_send_proxy") && parseInt(g("f_send_proxy").value))
              cfg.proxy_protocol = 1;
            else delete cfg.proxy_protocol;
            break;
          case "DeviceGroupType_OutboundByUser":
            break;
          case "DeviceGroupType_AgentOnly":
            break;
          case "DeviceGroupType_ChainOutbound":
            var chain = [];
            document
              .querySelectorAll("#f_chain_tbody tr")
              .forEach(function (tr) {
                var inputs = tr.querySelectorAll("input,select");
                chain.push({
                  seq: parseInt(inputs[0].value) || 0,
                  this_hop: parseInt(inputs[1].value) || 0,
                  next_hop: parseInt(inputs[2].value) || 0,
                  mux: inputs[3].value === "1",
                });
              });
            if (chain.length > 0) cfg.chain = chain;
            break;
        }
        return JSON.stringify(cfg);

      function loadFr() {

          .then(function () {
            updateFrSearchSelects();
            return api(API + "/admin/forward");
          })
          .then(function (d) {
            frData = d.data || [];
            frSelected.clear();
            renderFrTable();
            updateFrStats();

            if (tbl) tbl.style.display = "";
            if (g("fr-check-all")) g("fr-check-all").checked = false;

      function renderFrTable() {
        var filtered = frData;
        // Apply all filters
        if (frFilterName) {
          var fn = frFilterName.toLowerCase();
          filtered = filtered.filter(function (r) {
            return (r.name || "").toLowerCase().includes(fn);
          });
        }
        if (frFilterPort) {
          var fp = parseInt(frFilterPort);
          filtered = filtered.filter(function (r) {
            return r.listen_port === fp;
          });
        }
        if (frFilterIn) {
          var fi = parseInt(frFilterIn);
          filtered = filtered.filter(function (r) {
            return r.device_group_in === fi;
          });
        }
        if (frFilterOut) {
          var fo = parseInt(frFilterOut);
          filtered = filtered.filter(function (r) {
            return r.device_group_out === fo;
          });
        }
        if (frSearchTerm && !frFilterName && !frFilterPort) {
          var s = frSearchTerm.toLowerCase();
          filtered = filtered.filter(function (r) {
            return (
              (r.name || "").toLowerCase().includes(s) ||
              String(r.listen_port).includes(s) ||
              String(r.id).includes(s)
            );
          });
        }
        g("fr-total-count").textContent = filtered.length;
        var rows = "";
        filtered.forEach(function (r) {
          var cfg = {};
          try {
            cfg = JSON.parse(r.config || "{}");

          var dests = (cfg.dest || []).join(", ") || "-";

            '<td><input type="checkbox" ' +

            "<td>" +
            r.id +
            "</td>" +
            "<td><strong>" +
            esc(r.name) +
            "</strong>" +
            (r.paused ? ' <span class="tag t-red">已暂停</span>' : "") +
            "</td>" +
            "<td>" +
            getInInfo(r.device_group_in, r.listen_port) +
            "</td>" +
            "<td>" +
            getOutInfo(r.device_group_out, dests) +
            "</td>" +
            "<td>" +
            fmt(r.traffic_used || 0) +
            "</td>" +
            '<td><span class="tag ' +
            (r.status === "ForwardRuleStatus_Failed" ? "t-red" : "t-green") +

      function updateFrStats() {

      // ========== BATCH IMPORT MODAL ==========
      function frBatchImport() {
        var h = "<h3>批量导入规则</h3>";
        h +=
          '<div style="margin-bottom:8px;font-size:12px;color:#888">每行一个规则，格式: 名称,端口,入口GID,出口GID,目标地址</div>';
        h +=
          '<div class="f-grp"><textarea id="f_bi_text" rows="10" style="font-family:monospace;font-size:12px" placeholder="VIETNAM-HN1|LC1,19001,20,22,vngoc.hn.scdh2268.com:2900"></textarea></div>';
        h +=
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><input type="checkbox" id="f_bi_json"><label style="margin:0;cursor:pointer;font-size:13px">Dung dinh dang JSON</label></div>';
        h +=
          '<div class="modal-actions"><button class="btn" onclick="closeModal()">Huy</button> <button class="btn btn-primary" onclick="submitBatchImport()">导入</button></div>';
        g("modalBody").innerHTML = h;
        g("modalOverlay").style.display = "flex";
      }
      function submitBatchImport() {
        var raw = g("f_bi_text").value.trim();
        if (!raw) {
          pe("Vui long nhap du lieu");
          return;
        }
        var isJson = g("f_bi_json").checked;
        var rules = [];
        if (isJson) {
          try {
            rules = JSON.parse(raw);
            if (!Array.isArray(rules)) throw new Error("Phai la mang JSON");
          } catch (e) {
            pe("JSON khong hop le: " + e.message);
            return;
          }
        } else {
          var lines = raw.split("\n").filter(function (l) {
            return l.trim();
          });
          lines.forEach(function (line) {
            var parts = line.split(",");
            if (parts.length >= 5) {
              var dests = parts
                .slice(4)
                .join(",")
                .split(";")
                .filter(function (d) {
                  return d.trim();
                });
              rules.push({
                name: parts[0].trim(),
                listen_port: parseInt(parts[1]) || 0,
                device_group_in: parseInt(parts[2]) || 0,
                device_group_out: parseInt(parts[3]) || 0,
                config: JSON.stringify({ dest: dests }),
                status: "ForwardRuleStatus_Normal",
              });
            }
          });
        }
        if (rules.length === 0) {
          pe("Khong co rule hop le");
          return;
        }
        var done = 0,
          total = rules.length;
        rules.forEach(function (r) {
          apiPut(API + "/admin/forward", r)
            .then(function () {
              done++;
              if (done === total) {
                closeModal();
                loadFr();
              }
            })
            .catch(function (e) {
              done++;
              if (done === total) {
                closeModal();
                loadFr();
              }
              pe(e.message);
            });
        });
      }

      // ========== BATCH EXPORT MODAL ==========

        var ids =
          frSelected.size > 0

              });

          return ids.includes(r.id);
        });

        var csvLines = [
          "id,name,listen_port,device_group_in,device_group_out,traffic_used,status",

        data.forEach(function (r) {

          } catch (e) {}

            [

              r.device_group_in,
              r.device_group_out,

      function toggleAdvanced() {
        window._advOpen = !window._advOpen;
        g("f_adv_section").style.display = window._advOpen ? "block" : "none";

      function loadFrConnInfo(rid, dgIn, dgOut) {
        // Hien thi protocol va thong tin ket noi tu device group config
        var detailEl = g("fr-conn-detail");
        if (!detailEl) return;
        loadDgCache()
          .then(function () {
            var dgOutGroup = dgCache.find(function (x) {
              return x.id === dgOut;
            });
            var dgInGroup = dgCache.find(function (x) {
              return x.id === dgIn;
            });
            var parts = [];
            // Protocol info from outbound group
            if (dgOutGroup) {
              var cfg = {};
              try {
                cfg = JSON.parse(dgOutGroup.config || "{}");
              } catch (e) {}
              var proto = cfg.protocol || cfg.display_protocol || "";
              if (proto === "tls" || proto === "tls_simple")
                parts.push('<span style="color:#1677ff">协议: TLS 隧道</span>');
              else if (proto === "ws")
                parts.push('<span style="color:#1677ff">协议: WS 隧道</span>');
              else if (proto === "http")
                parts.push(
                  '<span style="color:#1677ff">协议: HTTP 隧道</span>',
                );
              else if (proto)
                parts.push(
                  '<span style="color:#1677ff">协议: ' + esc(proto) + "</span>",
                );
              // Delay optimization
              if (cfg.delay_optimization || dgOutGroup.delay_optimization)
                parts.push('<span style="color:#52c41a">延迟优化: 开启</span>');
              // Proxy protocol
              if (cfg.accept_proxy_protocol === 1)
                parts.push("<span>接受 Proxy Protocol</span>");
              if (cfg.proxy_protocol === 1)
                parts.push("<span>发送 Proxy v1 (TCP)</span>");
              else if (cfg.proxy_protocol === 2)
                parts.push("<span>发送 Proxy v2 (TCP+UDP)</span>");
              else if (cfg.proxy_protocol === 3)
                parts.push("<span>发送 Proxy v2 (TCP)</span>");
              // Ratio info
              if (dgOutGroup.ratio && dgOutGroup.ratio !== "0")
                parts.push("<span>倍率: " + esc(dgOutGroup.ratio) + "</span>");
              // Connect host
              if (dgOutGroup.connect_host)
                parts.push(
                  '<span style="color:#999">出口: ' +
                    esc(dgOutGroup.name) +
                    " → " +
                    esc(dgOutGroup.connect_host) +
                    "</span>",
                );
            }
            if (dgInGroup) {
              if (dgInGroup.ratio && dgInGroup.ratio !== "0")
                parts.push(
                  "<span>入口倍率: " + esc(dgInGroup.ratio) + "</span>",
                );
              if (dgInGroup.port_range)
                parts.push(
                  '<span style="color:#999">入口: ' +
                    esc(dgInGroup.name) +
                    " (" +
                    esc(dgInGroup.port_range) +
                    ")</span>",
                );
            }
            if (parts.length === 0)
              parts.push('<span style="color:#999">暂无连接信息</span>');
            detailEl.innerHTML = parts.join(" | ");
            // Also load node status
            return api(API + "/system/node/status");
          })
          .then(function (nd) {
            var nodes = nd && nd.data ? nd.data : [];
            var inNodes = nodes.filter(function (n) {
              return n.device_group_id === dgIn || n.gid === dgIn;
            });
            var outNodes = nodes.filter(function (n) {
              return n.device_group_id === dgOut || n.gid === dgOut;
            });
            var extra = [];
            if (inNodes.length > 0) {
              var statuses = inNodes.map(function (n) {
                return (
                  '<span style="color:' +
                  (n.online ? "#52c41a" : "#ff4d4f") +
                  '">● ' +
                  esc(n.handle || n.name || "?") +
                  "</span>"
                );
              });
              extra.push("入口节点: " + statuses.join(" "));
            }
            if (outNodes.length > 0) {
              var statuses2 = outNodes.map(function (n) {
                return (
                  '<span style="color:' +
                  (n.online ? "#52c41a" : "#ff4d4f") +
                  '">● ' +
                  esc(n.handle || n.name || "?") +
                  "</span>"
                );
              });
              extra.push("出口节点: " + statuses2.join(" "));
            }
            if (extra.length > 0) {
              detailEl.innerHTML += " | " + extra.join(" | ");
            }
          })
          .catch(function () {});
      }
      function submitFr(id) {
        var destRaw = g("f_fr_dest") ? g("f_fr_dest").value : "";
        var dests = destRaw.split("\n").filter(function (x) {
          return x.trim();
        });
        var cfg = { dest: dests };
        // Advanced options
        var policy = g("f_fr_policy").value;
        if (policy) cfg.dest_policy = policy;
        var acceptProxy = parseInt(g("f_fr_accept_proxy").value) || 0;
        if (acceptProxy) cfg.accept_proxy_protocol = acceptProxy;
        var sendProxy = parseInt(g("f_fr_send_proxy").value) || 0;
        if (sendProxy) cfg.proxy_protocol = sendProxy;
        var speed = parseInt(g("f_fr_speed").value) || 0;
        if (speed) cfg.speed_limit = speed;
        var ipLimit = parseInt(g("f_fr_iplimit").value) || 0;
        if (ipLimit) cfg.ip_limit = ipLimit;
        var connLimit = parseInt(g("f_fr_connlimit").value) || 0;
        if (connLimit) cfg.connection_limit = connLimit;
        var data = {
          name: g("f_fr_name").value,
          listen_port: parseInt(g("f_fr_port").value) || 0,
          device_group_in: parseInt(g("f_fr_in").value) || 0,
          device_group_out: parseInt(g("f_fr_out").value) || 0,
          config: JSON.stringify(cfg),
        };
        var note = g("f_fr_note").value.trim();
        if (note) data.note = note;
        if (!data.name || !data.listen_port) {
          pe("Vui long nhap ten va cong");
          return;
        }
        var p = id
          ? apiPost(API + "/admin/forward/" + id, data)
          : apiPut(API + "/admin/forward", data);
        p.then(function () {
          closeModal();
          loadFr();
        }).catch(function (e) {
          pe(e.message);
        });
      }

        if (!confirm("Xac nhan xoa rule #" + id + "?")) return;
        apiDel(API + "/admin/forward", { ids: [id] })
          .then(function () {

          .catch(function (e) {
